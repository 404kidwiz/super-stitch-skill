name: Validate

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up bash validation
        run: chmod +x scripts/*.sh

      - name: Run repository validator
        run: bash scripts/validate-repo.sh
